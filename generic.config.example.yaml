zammad:
  url: "https://zammad.example.com"
  token_env: "ZAMMAD_TOKEN"
  timeout: 30

defaults:
  group: "IT Support"
  article:
    type: "note"
    internal: false

jobs:
  - name: "Daily reminder"
    cron: "0 9 * * *"   # every day at 9:00
    tickets:
      - title: "Daily reminder"
        customer: "ops@example.com"
        article:
          subject: "Daily check-in"
          body: "Time for the daily check-in!"

  - name: "Weekly report"
    cron: "0 8 * * 1"   # every Monday at 8:00
    tickets:
      - title: "Weekly status"
        customer: "ops@example.com"
        article:
          subject: "Weekly report needed"
          body: "Please provide weekly report."
